name: Deploy React App

on:
  push:
    branches:
      - main  # Se activa al subir cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar código
        uses: actions/checkout@v4

      - name: 2. Instalar Node y dependencias
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Construir aplicación (Build)
        run: |
          npm install
          npm run build

      - name: 4. Enviar a VPS mediante SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          # CAMBIA ESTO a la carpeta que Nginx esté mirando en tu VPS
          target: "/home/ubuntu/docker/projects/mi-app-react/"
          strip_components: 1 # Para que no cree la carpeta 'dist' dentro del destino